let currentDeck = 0;

let currentSlide = 0;

let showingOverview = true;



// Build sidebar

const deckList = document.getElementById('deck-list');

DECKS.forEach((deck, di) => {

const el = document.createElement('div');

el.className = 'deck-item';

el.innerHTML = `<div class="deck-num">DECK ${String(di+1).padStart(2,'0')}</div><div class="deck-title">${deck.title}</div><div class="deck-sub">${deck.subtitle}</div>`;

el.addEventListener('click', () => { showingOverview = false; goToDeck(di, 0); });

deckList.appendChild(el);

});



// Build overview

const ov = document.getElementById('overview');

ov.innerHTML = `<h2>To Sell Is Human</h2><div class="ov-sub">Daniel H. Pink — Select a deck to begin</div><div class="ov-grid">${DECKS.map((d,i) => `<div class="ov-card" data-deck="${i}"><div class="ov-color-bar" style="background:${d.color}"></div><div class="ov-num">DECK ${String(i+1).padStart(2,'0')}</div><div class="ov-title">${d.title}</div><div class="ov-desc">${d.subtitle}</div><div class="ov-slides">${d.slides.length} SLIDES</div><div class="ov-deco">${i+1}</div></div>`).join('')}</div>`;

ov.querySelectorAll('.ov-card').forEach(card => {

card.addEventListener('click', () => { showingOverview = false; goToDeck(parseInt(card.dataset.deck), 0); });

});



// Build slides

const slideArea = document.getElementById('slide-area');



function buildSlides() {

document.querySelectorAll('.slide').forEach(s => s.remove());

DECKS.forEach((deck, di) => {

deck.slides.forEach((slide, si) => {

const el = document.createElement('div');

el.className = `slide layout-${slide.type}`;

el.dataset.deck = di;

el.dataset.slide = si;



if (slide.type === 'title') {

el.innerHTML = `<div class="slide-inner">

<div class="title-accent-bar" style="background:${deck.color}"></div>

<div class="title-rule" style="background:${deck.color}"></div>

<div class="deck-badge"><span class="badge-dot" style="background:${deck.color}"></span>Deck ${di+1} of ${DECKS.length} &nbsp;·&nbsp; ${deck.subtitle}</div>

<h2>${slide.heading.replace(/\n/g,'<br/>')}</h2>

<div class="subtitle">${slide.sub}</div>

<div class="title-deco-num">${di+1}</div>

</div>`;

} else {

const liColor = deck.color;

el.innerHTML = `<div class="slide-inner">

<div class="slide-content-main">

<div class="content-accent-bar" style="background:${deck.color}"></div>

<div class="slide-tag" style="color:${deck.color}">${slide.tag}</div>

<div class="slide-title-text">${slide.heading}</div>

<div class="slide-body slide-body-${di}">${slide.body}</div>

<div class="slide-footer">

<div class="slide-footer-num">Deck ${di+1} · Slide ${si+1} / ${deck.slides.length}</div>

<div class="slide-footer-rule"></div>

</div>

</div>

</div>`;

// Color list markers

el.querySelectorAll('.slide-body li').forEach(li => {

li.style.cssText += ``;

const pseudo = document.createElement('style');

});

// Apply li marker color via inline style trick

const styleTag = document.createElement('style');

styleTag.textContent = `.slide-body-${di} li::before { background: ${liColor} !important; }`;

document.head.appendChild(styleTag);

}



slideArea.appendChild(el);

});

});

}



buildSlides();



function goToDeck(di, si) {

currentDeck = di;

currentSlide = si;

renderState();

}



function renderState() {

document.getElementById('overview').classList.toggle('visible', showingOverview);

document.querySelectorAll('.slide').forEach(s => {

const active = !showingOverview && parseInt(s.dataset.deck) === currentDeck && parseInt(s.dataset.slide) === currentSlide;

s.classList.toggle('visible', active);

});

document.querySelectorAll('.deck-item').forEach((el, i) => el.classList.toggle('active', !showingOverview && i === currentDeck));



const total = DECKS[currentDeck]?.slides.length || 1;

document.getElementById('cur-num').textContent = showingOverview ? '—' : currentSlide + 1;

document.getElementById('total-num').textContent = showingOverview ? '—' : total;

document.getElementById('progress-fill').style.width = showingOverview ? '0%' : ((currentSlide + 1) / total * 100) + '%';

document.getElementById('btn-prev').disabled = showingOverview || (currentDeck === 0 && currentSlide === 0);

document.getElementById('btn-next').disabled = showingOverview || (currentDeck === DECKS.length - 1 && currentSlide === DECKS[currentDeck].slides.length - 1);

}



document.getElementById('btn-prev').addEventListener('click', () => {

if (showingOverview) return;

if (currentSlide > 0) currentSlide--;

else if (currentDeck > 0) { currentDeck--; currentSlide = DECKS[currentDeck].slides.length - 1; }

renderState();

});

document.getElementById('btn-next').addEventListener('click', () => {

if (showingOverview) return;

if (currentSlide < DECKS[currentDeck].slides.length - 1) currentSlide++;

else if (currentDeck < DECKS.length - 1) { currentDeck++; currentSlide = 0; }

renderState();

});

document.getElementById('overview-btn').addEventListener('click', () => { showingOverview = true; renderState(); });



document.addEventListener('keydown', e => {

if (showingOverview) return;

if (e.key === 'ArrowRight' || e.key === 'ArrowDown') document.getElementById('btn-next').click();

if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') document.getElementById('btn-prev').click();

if (e.key === 'Escape') { showingOverview = true; renderState(); }

});



renderState();

</script>
